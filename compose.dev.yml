# Development override — use with:
#   docker compose -f compose.yml -f compose.dev.yml up --build --watch

services:
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    ports:
      - "4040:4040"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http traefik:80
    depends_on:
      traefik:
        condition: service_started

  server:
    build:
      dockerfile: deploy/server.dev.Dockerfile
    volumes:
      - .:/workspace
    develop:
      watch:
        - action: restart
          path: ./cmd/server
        - action: restart
          path: ./internal
        - action: rebuild
          path: ./go.mod
        - action: rebuild
          path: ./go.sum

  trigger-server:
    build:
      dockerfile: deploy/trigger-server.dev.Dockerfile
    volumes:
      - .:/workspace
    develop:
      watch:
        - action: restart
          path: ./cmd/trigger-server
        - action: restart
          path: ./internal
        - action: rebuild
          path: ./go.mod
        - action: rebuild
          path: ./go.sum

  worker:
    build:
      dockerfile: deploy/worker.dev.Dockerfile
    volumes:
      - .:/workspace
    develop:
      watch:
        - action: restart
          path: ./cmd/worker
        - action: restart
          path: ./internal
        - action: restart
          path: ./config/agents
        - action: rebuild
          path: ./go.mod
        - action: rebuild
          path: ./go.sum
